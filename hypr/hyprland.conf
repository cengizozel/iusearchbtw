# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua



exec-once = hyprpaper
exec-once = swaync
exec-once = waybar
exec-once = hyprctl dispatch workspace 5
exec-once = [workspace 5] kitty

env = QT_QPA_PLATFORMTHEME,qt6ct

$mainMod = SUPER
$terminal = kitty
$fileManager = kitty yazi
$menu = rofi -show drun
$browser = librewolf

bind = $mainMod, T, exec, $terminal
bind = $mainMod, semicolon, exec, kitty -e claude
bind = $mainMod, A, exec, pavucontrol
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, exec, signal-desktop
bind = $mainMod, D, exec, kitty --title kitty-cal -e bash -c "cal $(date +%Y); read"
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, grave, exec, hyprctl reload
bind = ALT, space, exec, $menu

bind = ALT, Tab, focuscurrentorlast

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

binde = $mainMod ALT, H, resizeactive, -20 0
binde = $mainMod ALT, L, resizeactive, 20 0
binde = $mainMod ALT, K, resizeactive, 0 -20
binde = $mainMod ALT, J, resizeactive, 0 20
bind = $mainMod, O, layoutmsg, togglesplit

bind = $mainMod, S, exec, ~/.config/hypr/scripts/swap-enter.sh

submap = swapmode
bind = , H, movefocus, l
bind = , L, movefocus, r
bind = , K, movefocus, u
bind = , J, movefocus, d
bind = , return, exec, ~/.config/hypr/scripts/swap-do.sh
bind = , escape, exec, ~/.config/hypr/scripts/swap-cancel.sh
submap = reset

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9

# Screenshots
bind = , Print, exec, sh -c 'REGION=$(slurp) || exit; grim -g "$REGION" - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png && notify-send "Screenshot saved" -t 1000'
bind = $mainMod, Print, exec, grim - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png && notify-send "Screenshot saved" -t 1000

general {
    border_size = 3
    col.active_border = rgb(7aa2f7)
    col.inactive_border = rgb(292e42)
    gaps_in = 4
    gaps_out = 6
}

dwindle {
    preserve_split = true
}

decoration {
    rounding = 8
}

animations {
    enabled = true
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    animation = windows, 1, 1, linear
    animation = workspaces, 1, 1, linear
    animation = fade, 1, 1, linear
}

input {
    follow_mouse = 2
    float_switch_override_focus = 0
}

windowrule = float on, match:title ^Friends List$

bindn = , mouse:272, exec, ~/.local/bin/rofi-click-away
bindn = , mouse:273, exec, ~/.local/bin/rofi-click-away
bindn = , mouse:274, exec, ~/.local/bin/rofi-click-away

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ && touch /tmp/waybar-vol-changed && kill -42 $(pidof waybar)
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && touch /tmp/waybar-vol-changed && kill -42 $(pidof waybar)
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && touch /tmp/waybar-vol-changed && kill -42 $(pidof waybar)
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
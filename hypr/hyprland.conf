# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua



exec-once = hyprpaper
exec-once = waybar

env = QT_QPA_PLATFORMTHEME,qt6ct

$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun
$browser = librewolf

bind = $mainMod, T, exec, $terminal
bind = $mainMod, A, exec, pavucontrol
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, exec, signal-desktop
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bindr = SUPER, Super_L, exec, $menu

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

binde = $mainMod ALT, H, resizeactive, -20 0
binde = $mainMod ALT, L, resizeactive, 20 0
binde = $mainMod ALT, K, resizeactive, 0 -20
binde = $mainMod ALT, J, resizeactive, 0 20
bind = $mainMod, O, layoutmsg, orientationcycle

bind = $mainMod, S, exec, ~/.config/hypr/scripts/swap-enter.sh

submap = swapmode
bind = , H, movefocus, l
bind = , L, movefocus, r
bind = , K, movefocus, u
bind = , J, movefocus, d
bind = , return, exec, ~/.config/hypr/scripts/swap-do.sh
bind = , escape, exec, ~/.config/hypr/scripts/swap-cancel.sh
submap = reset

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9

# Screenshots
bind = , Print, exec, sh -c 'REGION=$(slurp) || exit; grim -g "$REGION" - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png && dunstify "Screenshot saved" -t 1000'
bind = $mainMod, Print, exec, grim - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png && dunstify "Screenshot saved" -t 1000

general {
    col.active_border = rgb(7aa2f7)
    col.inactive_border = rgb(292e42)
    gaps_in = 4
    gaps_out = 8
}

decoration {
    rounding = 0
}

animations {
    enabled = true
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    animation = windows, 1, 1, linear
    animation = workspaces, 1, 1, linear
    animation = fade, 1, 1, linear
}

input {
    follow_mouse = 2
}